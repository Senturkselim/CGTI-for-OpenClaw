name: CGTI Lite CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install "rich>=13.0.0" pytest

      - name: Syntax check
        run: python -m py_compile cgti_lite.py

      - name: Run tests
        run: python -m pytest test_cgti.py -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate rule files
        run: |
          count=0
          for f in rules/*.rules; do
            n=$(grep -c "^alert " "$f" || true)
            echo "$f: $n rules"
            count=$((count + n))
          done
          echo "Total: $count rules"
          [ "$count" -ge 640 ] || (echo "Rule count too low!" && exit 1)
